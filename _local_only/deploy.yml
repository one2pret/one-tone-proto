name: Build and Deploy One Tone Proto

on:
    push:
        branches:
            - main

jobs:
    build-and-deploy:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Log in to GitHub Container Registry
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract metadata
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ghcr.io/one2pret/one-tone-proto

            - name: Build and push Docker image
              uses: docker/build-push-action@v6
              with:
                  context: .
                  push: true
                  tags: ghcr.io/one2pret/one-tone-proto:latest
                  labels: ${{ steps.meta.outputs.labels }}

            - name: Deploy on VPS
              uses: appleboy/ssh-action@v1.0.3
              with:
                  host: ${{ secrets.VPS_HOST }}
                  username: ${{ secrets.VPS_USER }}
                  key: ${{ secrets.VPS_SSH_KEY }}
                  script: |
                      mkdir -p /opt/apps/one-tone-proto
                      cd /opt/apps/one-tone-proto
                      cat > docker-compose.yml <<'EOF'
                      services:
                        one-tone:
                          image: ghcr.io/one2pret/one-tone-proto:latest
                          container_name: one-tone-app
                          restart: unless-stopped
                          ports:
                            - "8095:80"
                      EOF
                      docker compose pull
                      docker compose up -d
